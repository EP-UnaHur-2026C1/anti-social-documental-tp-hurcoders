paths:
  /posts:
    get:
      summary: Obtener todos los posts
      tags: [Posts]
      responses:
        '200':
          description: Lista de posts con usuario populado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: Crear un post
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content, user]
              properties:
                title:
                  type: string
                  description: Título del post
                  example: "Mi primer post"
                content:
                  type: string
                  description: Contenido del post
                  example: "Hola mundo!"
                user:
                  type: string
                  description: ID del usuario autor
      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Usuario no encontrado
        '400':
          description: Error de validación

  /posts/{id}:
    get:
      summary: Obtener un post por ID
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del post
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
        '400':
          description: ID no válido

    put:
      summary: Actualizar un post
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
      responses:
        '200':
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado

    delete:
      summary: Eliminar un post
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Post eliminado
        '404':
          description: Post no encontrado

components:
  schemas:
    Post:
      type: object
      properties:
        _id:
          type: string
          description: ID del post
        title:
          type: string
          description: Título del post
        content:
          type: string
          description: Contenido del post
        postDate:
          type: string
          format: date-time
          description: Fecha de publicación
        user:
          type: object
          properties:
            _id:
              type: string
            nickName:
              type: string
          description: Usuario autor (populado)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
