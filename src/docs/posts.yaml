paths:
  /posts:
    get:
      summary: Obtener todos los posts
      tags: [Posts]
      responses:
        '200':
          description: Lista de posts con usuario populado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: Crear un post
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content, userId]
              properties:
                title:
                  type: string
                  description: Título del post
                  example: "Mi primer post"
                content:
                  type: string
                  description: Contenido del post
                  example: "Hola mundo!"
                userId:
                  type: string
                  description: ID del usuario autor
                  example: "6a3dc5b131fedad47dd579e3"
      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Usuario no encontrado
        '400':
          description: Error de validación

  /posts/{id}:
    get:
      summary: Obtener un post por ID
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del post
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
        '400':
          description: ID no válido

    put:
      summary: Actualizar un post
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado

    delete:
      summary: Eliminar un post
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Post eliminado
        '404':
          description: Post no encontrado

  /posts/{id}/images:
    post:
      summary: Agregar imagen embebida por URL
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageUrl]
              properties:
                imageUrl:
                  type: string
                  format: uri
                  example: "https://example.com/imagen.jpg"
      responses:
        '201':
          description: Imagen embebida agregada al post
        '400':
          description: Error de validación
        '404':
          description: Post no encontrado

  /posts/{id}/images/{imageId}:
    delete:
      summary: Eliminar imagen embebida
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del post
        - in: path
          name: imageId
          required: true
          schema:
            type: string
          description: ID de la imagen embebida
      responses:
        '204':
          description: Imagen eliminada
        '404':
          description: Post o imagen no encontrada

  /posts/{postId}/comments:
    get:
      summary: Obtener comentarios de un post
      tags: [Posts]
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
          description: ID del post
      responses:
        '200':
          description: Lista de comentarios del post
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '400':
          description: ID no válido
        '404':
          description: Post no encontrado

    post:
      summary: Crear un comentario en un post
      tags: [Posts]
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
          description: ID del post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, userId]
              properties:
                content:
                  type: string
                  description: Contenido del comentario
                  example: "Muy buen post!"
                userId:
                  type: string
                  description: ID del usuario que comenta
                  example: "665f1a2b3c4d5e6f7a8b9c0d"
      responses:
        '201':
          description: Comentario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Error de validación
        '404':
          description: Post no encontrado

  /posts/{postId}/comments/{id}:
    put:
      summary: Actualizar un comentario
      tags: [Posts]
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
          description: ID del post
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del comentario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Nuevo contenido del comentario
                  example: "Actualicé mi comentario"
      responses:
        '200':
          description: Comentario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: ID no válido
        '404':
          description: Post o comentario no encontrado

    delete:
      summary: Eliminar un comentario
      tags: [Posts]
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
          description: ID del post
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del comentario
      responses:
        '204':
          description: Comentario eliminado
        '400':
          description: ID no válido
        '404':
          description: Post o comentario no encontrado

components:
  schemas:
    Post:
      type: object
      properties:
        _id:
          type: string
          description: ID del post
        title:
          type: string
          description: Título del post
        content:
          type: string
          description: Contenido del post
        postDate:
          type: string
          format: date-time
          description: Fecha de publicación
        userId:
          type: object
          properties:
            _id:
              type: string
            nickName:
              type: string
          description: Usuario autor (populado)
        images:
          type: array
          description: Imagenes embebidas en el post
          items:
            type: object
            properties:
              _id:
                type: string
              imageUrl:
                type: string
              createdAt:
                type: string
                format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        _id:
          type: string
          description: ID del comentario
        content:
          type: string
          description: Contenido del comentario
        commentDate:
          type: string
          format: date-time
          description: Fecha del comentario
        isVisible:
          type: boolean
          description: Indica si el comentario es visible según la ventana de visibilidad
          example: true
        postId:
          type: string
          description: ID del post asociado
        userId:
          type: object
          properties:
            _id:
              type: string
            nickName:
              type: string
          description: Usuario autor (populado)
          
    PostWithComments:
      allOf:
        - $ref: '#/components/schemas/Post'
        - type: object
          properties:
            comments:
              type: array
              description: Comentarios del post
              items:
                $ref: '#/components/schemas/Comment'